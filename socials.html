<!DOCTYPE html>
<html>
<head>
    <title>Socials - Ben&Ben</title>

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body{
            background-image: url("Ben&Ben BG.svg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;

            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

       
        .nav{
            background-color: rgba(152,147,21,0.819);
            width: 1000px;
            margin: 30px auto;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 8px 18px rgba(0,0,0,0.5);
        }

        .nav a{
            display: inline-block;
            text-decoration: none;
            color: black;
            width: 140px;
            padding: 5px;
            margin: 5px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            font-family: "Libre Baskerville", serif;
            font-size: 16px;
        }

     
        .social-icons{
            text-align:center;
            margin-top:50px;
        }

        .icon{
            width:120px;
            height:120px;
            object-fit: contain;
            margin:0 25px;
            filter: drop-shadow(5px 10px 10px rgba(0,0,0,0.7));
        }


        .center-text{
            text-align:center;
            margin-top:30px;
            font-family:"Libre Baskerville", serif;
            font-size:30px;
            color:black;
            text-shadow:2px 2px 4px rgba(0,0,0,0.4);
        }


        .contact-box{
            width:400px;
            background:rgba(255,255,255,0.9);
            padding:30px;
            margin:50px auto;
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .contact-box h2{
            text-align:center;
            margin-bottom:25px;
            font-family:"Libre Baskerville", serif;
        }

        .contact-box label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        .contact-box input{
            width:100%;
            padding:12px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:10px;
            box-sizing:border-box;
        }

        .contact-box button{
            width:100%;
            padding:12px;
            margin-top:25px;
            border:none;
            border-radius:10px;
            background-color:#989315;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .contact-box button:hover{
            opacity:0.9;
        }

        .map{
            width:90%;
            max-width:1000px;
            margin:50px auto;
            padding-bottom:50px;
        }

        .map iframe{
            width:100%;
            height:400px;
            border:0;
            border-radius:20px;
            box-shadow:0px 8px 18px rgba(0,0,0,0.5);
        }

    </style>
</head>

<body>

    
    <div class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="members.php">Members</a>
        <a href="albums.html">Albums</a>
        <a href="achievements.html">Achievements</a>
        <a href="socials.html">Socials</a>
    </div>

  
    <div class="social-icons">
        <img src="images/Fblogo.png" class="icon" alt="Facebook">
        <img src="images/instagram-logo.png" class="icon" alt="Instagram">
        <img src="images/tiktok_logo.png" class="icon" alt="TikTok">
        <img src="images/YouTube-Logo.png" class="icon" alt="YouTube">
    </div>

    <!-- Text -->
    <div class="center-text">
        <p>Follow @Ben&Ben In All Platforms</p>
    </div>

    <!-- Contact Us -->
    <div class="contact-box">
        <h2>Contact Us</h2>

        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" required>

            <button type="submit">Submit</button>
        </form>
    </div>

    <!-- Google Map -->
    <div class="map">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d125474.86950355388!2d123.01782114999999!3d10.650141549999997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33aed1aede61785b%3A0xea7972541b89f76b!2sBacolod%2C%20Negros%20Occidental!5e0!3m2!1sen!2sph!4v1779675290526!5m2!1sen!2sph"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </div>

</body>
</html>
